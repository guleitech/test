<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片格式转换器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover, .upload-area.dragover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area input {
            display: none;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
        }
        .preview {
            display: none;
            margin-bottom: 20px;
            text-align: center;
        }
        .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .file-info {
            font-size: 14px;
            color: #666;
        }
        .format-select {
            margin-bottom: 20px;
        }
        .format-select label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .format-select select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .download-btn {
            display: block;
            margin-top: 15px;
            padding: 12px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
        .download-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 图片格式转换器</h1>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击或拖拽上传图片</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="preview" id="preview">
            <img id="previewImage" src="" alt="预览">
            <div class="file-info" id="fileInfo"></div>
        </div>
        
        <div class="format-select">
            <label for="targetFormat">目标格式：</label>
            <select id="targetFormat">
                <option value="webp">WebP (推荐)</option>
                <option value="png">PNG</option>
                <option value="jpeg">JPEG</option>
            </select>
        </div>
        
        <button class="submit-btn" id="submitBtn" disabled>请先上传图片</button>
        
        <div id="status" class="status"></div>
    </div>

    <script>
        // ⚠️ Cloudflare Worker 地址（部署后替换）
        const WORKER_URL = 'https://cold-sun-adda.291278035.workers.dev/api/create-checkout-session';
        
        let selectedFile = null;
        let selectedFormat = 'webp';
        
        // 初始化 - 检查是否从 Stripe 返回
        init();
        
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const paySuccess = urlParams.get('pay_success');
            const format = urlParams.get('format');
            const imageData = urlParams.get('image');
            
            // 从 URL 参数恢复并自动转换
            if (paySuccess === '1' && imageData) {
                updateStatus('✅ 支付成功！正在转换图片...', 'loading');
                
                try {
                    // 延迟执行，确保页面完全加载
                    setTimeout(() => {
                        const file = dataURLtoFile(decodeURIComponent(imageData), `image.${format || 'webp'}`);
                        convertImageWithCanvas(file, format || 'webp');
                    }, 500);
                } catch (e) {
                    updateStatus('错误: ' + e.message, 'error');
                }
            }
            
            // 清理 URL 参数
            if (paySuccess) {
                window.history.replaceState({}, '', window.location.pathname);
            }
        }
        
        // 将 Data URL 转换为 File 对象
        function dataURLtoFile(dataurl, filename) {
            const arr = dataurl.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while (n--) {
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, { type: mime });
        }
        
        // 文件上传处理
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const fileInfo = document.getElementById('fileInfo');
        const submitBtn = document.getElementById('submitBtn');
        const targetFormat = document.getElementById('targetFormat');
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        targetFormat.addEventListener('change', (e) => {
            selectedFormat = e.target.value;
        });
        
        function handleFile(file) {
            selectedFile = file;
            selectedFormat = document.getElementById('targetFormat').value;
            
            // 显示预览
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                fileInfo.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
                preview.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = '💳 支付并转换';
            };
            reader.readAsDataURL(file);
        }
        
        // 支付并转换按钮点击事件
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                updateStatus('请先上传图片', 'error');
                return;
            }
            
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '准备支付...';
                updateStatus('正在连接支付...', 'loading');
                
                // 将图片转为 Base64
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const imageData = e.target.result;
                    
                    updateStatus('正在跳转到支付页面...', 'loading');
                    
                    // 调用 Cloudflare Worker 创建 Stripe Checkout Session
                    const response = await fetch(WORKER_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            format: selectedFormat
                        })
                    });
                    
                    const text = await response.text();
                    
                    if (!response.ok) {
                        throw new Error('支付服务暂时不可用');
                    }
                    
                    const data = JSON.parse(text);
                    
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    
                    if (!data.url) {
                        throw new Error('无法获取支付链接');
                    }
                    
                    // 跳转到 Stripe Checkout
                    window.location.href = data.url;
                };
                reader.readAsDataURL(selectedFile);
                
            } catch (error) {
                updateStatus('错误: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '💳 支付并转换';
            }
        });
        
        // 使用 Canvas API 转换图片（纯前端，无需后端）
        async function convertImageWithCanvas(file, targetFormat) {
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '转换中...';
                updateStatus('正在转换图片...', 'loading');
                
                // 创建图片对象
                const img = new Image();
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                    img.src = URL.createObjectURL(file);
                });
                
                // 创建 Canvas 并绘制图片
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                // 转换为目标格式
                const mimeType = `image/${targetFormat}`;
                const quality = targetFormat === 'jpeg' ? 0.92 : undefined;
                const dataUrl = canvas.toDataURL(mimeType, quality);
                
                // 清理
                URL.revokeObjectURL(img.src);
                
                updateStatus('转换成功！', 'success');
                submitBtn.textContent = '转换完成';
                
                // 添加下载按钮
                const downloadBtn = document.createElement('a');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = '📥 下载转换后的图片';
                downloadBtn.download = `converted.${targetFormat}`;
                downloadBtn.href = dataUrl;
                document.getElementById('status').appendChild(downloadBtn);
                
            } catch (error) {
                updateStatus('错误: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '💳 支付并转换';
            }
        }
        
        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.innerHTML = message;
        }
    </script>
</body>
</html>
