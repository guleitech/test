<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片格式转换器</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #f0f3ff;
            border-color: #667eea;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        #fileInput {
            display: none;
        }
        .preview {
            margin-top: 20px;
            display: none;
        }
        .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
        }
        .file-info {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .format-select {
            margin: 20px 0;
        }
        .format-select label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .format-select select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .format-select select:focus {
            outline: none;
            border-color: #667eea;
        }
        .price-info {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            color: #667eea;
            font-weight: 600;
        }
        #payment-element {
            margin: 20px 0;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .download-btn {
            margin-top: 10px;
            background: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 图片格式转换器</h1>
        <p class="subtitle">快速将图片转换为所需格式</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>点击或拖拽上传图片</p>
            <p style="font-size: 12px; color: #999; margin-top: 8px;">支持 JPG, PNG, WEBP, GIF (最大10MB)</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        
        <div class="preview" id="preview">
            <img id="previewImage" src="" alt="预览">
            <div class="file-info" id="fileInfo"></div>
        </div>
        
        <div class="format-select">
            <label>目标格式</label>
            <select id="targetFormat">
                <option value="webp">WEBP (推荐)</option>
                <option value="jpeg">JPEG</option>
                <option value="png">PNG</option>
                <option value="gif">GIF</option>
            </select>
        </div>
        
        <div class="price-info">
            每次转换仅需 $0.99 💸
        </div>
        
        <button id="submitBtn" disabled>请先上传图片</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        // ⚠️ 如果后端部署在其他地方，取消下面这行的注释并修改地址
        // const API_BASE = 'https://your-backend-url.onrender.com';
        const API_BASE = ''; // 空字符串表示使用同源

        // Stripe Checkout 支付链接
        const STRIPE_CHECKOUT_URL = 'https://buy.stripe.com/test_4gM14o5pL1RK6NjbVM2Ry02';

        let selectedFile;
        let hasPaid = false; // 标记是否已支付
        let pendingFileData = null; // 保存待转换的文件数据

        // 文件上传处理
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const fileInfo = document.getElementById('fileInfo');
        const submitBtn = document.getElementById('submitBtn');

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                updateStatus('请选择图片文件', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                updateStatus('图片大小不能超过10MB', 'error');
                return;
            }
            
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                preview.style.display = 'block';
                fileInfo.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                submitBtn.disabled = false;
                submitBtn.textContent = '支付并转换';
            };
            reader.readAsDataURL(file);
        }

        // IndexedDB 存储管理
        const DB_NAME = 'ImageConverterDB';
        const DB_VERSION = 1;
        const STORE_NAME = 'pendingFiles';
        let db = null;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = (event) => {
                    const database = event.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                    }
                };
            });
        }

        async function saveToDB(fileData) {
            await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const data = { id: 'pending', ...fileData };
                const request = store.put(data);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        async function getFromDB() {
            await initDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readonly');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.get('pending');
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteFromDB() {
            if (!db) return;
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.delete('pending');
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // 支付并转换按钮点击事件
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                updateStatus('请先上传图片', 'error');
                return;
            }
            
            // 将文件转为 Base64
            const targetFormat = document.getElementById('targetFormat').value;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    // 保存到 IndexedDB
                    await saveToDB({
                        name: selectedFile.name,
                        type: selectedFile.type,
                        format: targetFormat,
                        data: e.target.result,
                        timestamp: Date.now()
                    });
                    
                    // 跳转到 Stripe 支付页面
                    const successUrl = encodeURIComponent(window.location.origin + '?payment=success');
                    const cancelUrl = encodeURIComponent(window.location.href);
                    window.location.href = STRIPE_CHECKOUT_URL + `?success_url=${successUrl}&cancel_url=${cancelUrl}`;
                } catch (err) {
                    updateStatus('存储失败，请重试', 'error');
                    console.error(err);
                }
            };
            reader.readAsDataURL(selectedFile);
        });

        // 将 Base64 转换为 Blob
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64.split(',')[1]);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }

        // 检查是否从 Stripe 支付页面返回
        async function checkReturnFromStripe() {
            const urlParams = new URLSearchParams(window.location.search);
            const paymentStatus = urlParams.get('payment');
            
            if (paymentStatus === 'success') {
                try {
                    const fileData = await getFromDB();
                    if (fileData && fileData.data) {
                        // 检查是否过期（1小时）
                        if (Date.now() - fileData.timestamp > 3600000) {
                            await deleteFromDB();
                            updateStatus('数据已过期，请重新上传', 'error');
                            return;
                        }
                        updateStatus('✅ 支付成功！正在转换图片...', 'loading');
                        convertImage(fileData);
                        return;
                    }
                } catch (e) {
                    console.error('读取数据失败:', e);
                }
                updateStatus('✅ 支付成功！但未找到图片数据，请重新上传', 'success');
            }
        }

        // 页面加载时检查是否从 Stripe 返回
        checkReturnFromStripe();

        async function convertImage(fileData) {
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '转换中...';
                
                // 将 Base64 转换为 File 对象
                const blob = base64ToBlob(fileData.data, fileData.type);
                const file = new File([blob], fileData.name, { type: fileData.type });
                
                updateStatus('正在转换图片...', 'loading');
                
                const formData = new FormData();
                formData.append('image', file);
                formData.append('targetFormat', fileData.format);
                
                const convertResponse = await fetch(`${API_BASE}/api/convert`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await convertResponse.json();
                if (!result.success) throw new Error(result.error);
                
                // 清理 sessionStorage
                sessionStorage.removeItem('pendingFile');
                
                updateStatus('转换成功！', 'success');
                submitBtn.textContent = '转换完成';
                
                // 添加下载按钮
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = '📥 下载转换后的图片';
                downloadBtn.onclick = () => window.location.href = result.downloadUrl;
                document.getElementById('status').appendChild(downloadBtn);
                
            } catch (error) {
                updateStatus('错误: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '支付并转换';
            }
        }

        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.innerHTML = message;
        }
    </script>
</body>
</html>
