<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片格式转换器</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            background: #f8f9ff;
            border-color: #764ba2;
        }
        .upload-area.dragover {
            background: #f0f3ff;
            border-color: #667eea;
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        #fileInput {
            display: none;
        }
        .preview {
            margin-top: 20px;
            display: none;
        }
        .preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 10px;
        }
        .file-info {
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
        .format-select {
            margin: 20px 0;
        }
        .format-select label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        .format-select select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .format-select select:focus {
            outline: none;
            border-color: #667eea;
        }
        .price-info {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 8px;
            color: #667eea;
            font-weight: 600;
        }
        #payment-element {
            margin: 20px 0;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .status.loading {
            background: #fff3cd;
            color: #856404;
            display: block;
        }
        .download-btn {
            margin-top: 10px;
            background: #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ 图片格式转换器</h1>
        <p class="subtitle">快速将图片转换为所需格式</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>点击或拖拽上传图片</p>
            <p style="font-size: 12px; color: #999; margin-top: 8px;">支持 JPG, PNG, WEBP, GIF (最大10MB)</p>
        </div>
        <input type="file" id="fileInput" accept="image/*">
        
        <div class="preview" id="preview">
            <img id="previewImage" src="" alt="预览">
            <div class="file-info" id="fileInfo"></div>
        </div>
        
        <div class="format-select">
            <label>目标格式</label>
            <select id="targetFormat">
                <option value="webp">WEBP (推荐)</option>
                <option value="jpeg">JPEG</option>
                <option value="png">PNG</option>
                <option value="gif">GIF</option>
            </select>
        </div>
        
        <div class="price-info">
            每次转换仅需 $0.99 💸
        </div>
        
        <button id="submitBtn" disabled>请先上传图片</button>
        
        <div class="status" id="status"></div>
    </div>

    <script>
        // API 配置
        const API_BASE = '';

        let selectedFile;

        // 文件上传处理
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const previewImage = document.getElementById('previewImage');
        const fileInfo = document.getElementById('fileInfo');
        const submitBtn = document.getElementById('submitBtn');

        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                updateStatus('请选择图片文件', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                updateStatus('图片大小不能超过10MB', 'error');
                return;
            }
            
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImage.src = e.target.result;
                preview.style.display = 'block';
                fileInfo.textContent = `${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
                submitBtn.disabled = false;
                submitBtn.textContent = '支付并转换';
            };
            reader.readAsDataURL(file);
        }

        // 支付并转换按钮点击事件
        submitBtn.addEventListener('click', async () => {
            if (!selectedFile) {
                updateStatus('请先上传图片', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '正在跳转支付...';
            
            try {
                // 将文件转为 Base64
                const targetFormat = document.getElementById('targetFormat').value;
                const base64Data = await new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(selectedFile);
                });
                
                // 创建 Checkout Session
                const response = await fetch(`${API_BASE}/api/create-checkout-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        format: targetFormat,
                        imageData: base64Data
                    })
                });
                
                const { url, error } = await response.json();
                
                if (error) throw new Error(error);
                if (!url) throw new Error('获取支付链接失败');
                
                // 跳转到 Stripe Checkout
                window.location.href = url;
                
            } catch (err) {
                updateStatus('错误: ' + err.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '支付并转换';
            }
        });

        // 将 Base64 转换为 Blob
        function base64ToBlob(base64, mimeType) {
            const byteCharacters = atob(base64.split(',')[1]);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            return new Blob([byteArray], { type: mimeType });
        }

        // 检查是否从 Stripe 支付页面返回
        function checkReturnFromStripe() {
            const urlParams = new URLSearchParams(window.location.search);
            const paySuccess = urlParams.get('pay_success');
            const format = urlParams.get('format');
            const imageData = urlParams.get('image');
            
            if (paySuccess === '1' && imageData) {
                try {
                    const fileData = {
                        format: decodeURIComponent(format),
                        data: decodeURIComponent(imageData)
                    };
                    updateStatus('✅ 支付成功！正在转换图片...', 'loading');
                    convertImage(fileData);
                    // 清理 URL 参数
                    window.history.replaceState({}, '', window.location.pathname);
                } catch (e) {
                    updateStatus('处理失败，请重试', 'error');
                }
            } else if (urlParams.get('pay_canceled') === '1') {
                updateStatus('支付已取消', 'error');
                window.history.replaceState({}, '', window.location.pathname);
            }
        }

        // 页面加载时检查是否从 Stripe 返回
        checkReturnFromStripe();

        async function convertImage(fileData) {
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '转换中...';
                
                // 将 Base64 转换为 File 对象
                const mimeType = fileData.data.match(/^data:(.*?);/)[1] || 'image/png';
                const blob = base64ToBlob(fileData.data, mimeType);
                const file = new File([blob], 'image.' + (fileData.format || 'webp'), { type: mimeType });
                
                updateStatus('正在转换图片...', 'loading');
                
                const formData = new FormData();
                formData.append('image', file);
                formData.append('targetFormat', fileData.format);
                
                const convertResponse = await fetch(`${API_BASE}/api/convert`, {
                    method: 'POST',
                    body: formData
                });
                
                const result = await convertResponse.json();
                if (!result.success) throw new Error(result.error);
                
                updateStatus('转换成功！', 'success');
                submitBtn.textContent = '转换完成';
                
                // 添加下载按钮
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.textContent = '📥 下载转换后的图片';
                downloadBtn.onclick = () => window.location.href = result.downloadUrl;
                document.getElementById('status').appendChild(downloadBtn);
                
            } catch (error) {
                updateStatus('错误: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '支付并转换';
            }
        }

        function updateStatus(message, type) {
            const status = document.getElementById('status');
            status.className = 'status ' + type;
            status.innerHTML = message;
        }
    </script>
</body>
</html>
